<!DOCTYPE html>
<html>
<head>
    <title>My Web Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin-top: 50px;
        }

        h1 {
            color: darkblue;
        }

        p {
            font-size: 18px;
            color: #333;
        }

        button {
            background-color: blue;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>
</head>

<body>

    <h1>Welcome to My Website</h1>

    <p>This is a simple web page created using HTML and CSS.</p>

    <img src="https://via.placeholder.com/300"
         alt="Sample Image">

    <br><br>

    <button onclick="showMessage()">
        Click Me
    </button>

    <script>
        function showMessage() {
            alert("Hello! Welcome to my webpage.");
        }
    </script>

</body>
</html>
